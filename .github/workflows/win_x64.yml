name: Build for Windows x64

on:
  workflow_call:
    inputs:
      tag:
        description: "tag"
        required: false
        default: ""
        type: string
  workflow_dispatch:

jobs:
  build-windows-app:
    name: Release Windows x64
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml

      - name: Apply Patch
        shell: pwsh
        run: lib/scripts/patch.ps1 windows
        continue-on-error: true

      - name: Add fastforge and Inno Setup
        run: |
          dart pub global activate fastforge
          choco install innosetup

      - name: Add Chinese language file for Inno Setup
        run: |
          Copy-Item "windows/packaging/exe/ChineseSimplified.isl" "C:\Program Files (x86)\Inno Setup 6\Languages\ChineseSimplified.isl"
        shell: pwsh

      - name: Set and Extract version
        shell: pwsh
        run: lib/scripts/build.ps1

      - name: Build Windows
        run: |
          fastforge package --platform windows --targets exe --flutter-build-args="dart-define-from-file=pili_release.json"

      - name: Find build outputs
        run: |
          Write-Host "Checking build outputs..."
          if (Test-Path "build/windows/x64/runner/Release") {
            Write-Host "Found: build/windows/x64/runner/Release"
            Get-ChildItem "build/windows/x64/runner/Release"
          }
          if (Test-Path "dist") {
            Write-Host "Found: dist directory"
            Get-ChildItem "dist" -Recurse
          }
        shell: pwsh

      - name: Prepare Upload
        run: |
          mkdir -p Release/PiliPlus-Win
          mkdir -p PiliPlus-Win-Setup
          if (Test-Path "build/windows/x64/runner/Release") {
            Write-Host "Using build/windows/x64/runner/Release"
            mv build/windows/x64/runner/Release/* Release/PiliPlus-Win/
          } elseif (Get-ChildItem "dist" -Recurse -Filter "*.exe" -ErrorAction SilentlyContinue) {
            Write-Host "Using dist directory"
            Get-ChildItem "dist" -Recurse -Filter "*.exe" | Copy-Item -Destination "Release/PiliPlus-Win/" -ErrorAction SilentlyContinue
          }
          if (Get-ChildItem "dist" -Recurse -Filter "*setup*.exe" -ErrorAction SilentlyContinue) {
            mv dist/**/*setup*.exe PiliPlus-Win-Setup/PiliPlus_windows_${{env.version}}_x64_setup.exe
          } else {
            mv dist/**/*.exe PiliPlus-Win-Setup/PiliPlus_windows_${{env.version}}_x64_setup.exe 2>$null
          }

      - name: Compress
        run: |
          Compress-Archive -Path "Release/PiliPlus-Win" -DestinationPath "PiliPlus_windows_${{env.version}}_x64_portable.zip"
        shell: pwsh

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || inputs.tag || env.version }}
          name: ${{ github.event.inputs.tag || inputs.tag || env.version }}
          files: |
            PiliPlus_windows_*.zip
            PiliPlus-Win-Setup/PiliPlus_windows_*.exe

      - name: Upload windows file release
        uses: actions/upload-artifact@v7
        with:
          archive: true
          name: PiliPlus_windows_${{env.version}}_x64_portable
          path: Release

      - name: Upload windows setup release
        uses: actions/upload-artifact@v7
        with:
          archive: false
          name: Windows-setup-x64-release
          path: PiliPlus-Win-Setup/PiliPlus_windows_*.exe
